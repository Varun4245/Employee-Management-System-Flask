{% extends 'base.html' %}

{% block title %}Add Employee{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow-lg">

            <div class="card-header bg-success text-white">

                <h3 class="mb-0">
                    <i class="bi bi-person-plus-fill"></i>
                    Add New Employee
                </h3>

            </div>

            <div class="card-body">

                <form method="POST" enctype="multipart/form-data">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Employee Name
                            </label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                placeholder="Enter Employee Name"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Email Address
                            </label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                placeholder="Enter Email"
                                required>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Phone Number
                            </label>

                            <input
                                type="text"
                                name="phone"
                                class="form-control"
                                placeholder="Enter Phone Number"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Department
                            </label>

                            <select
                                name="department"
                                class="form-select"
                                required>

                                <option value="">Select Department</option>

                                <option>Human Resources</option>

                                <option>Finance</option>

                                <option>Marketing</option>

                                <option>Sales</option>

                                <option>IT</option>

                                <option>Operations</option>

                            </select>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Salary
                            </label>

                            <input
                                type="number"
                                name="salary"
                                class="form-control"
                                placeholder="Enter Salary"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Joining Date
                            </label>

                            <input
                                type="date"
                                name="joining_date"
                                class="form-control"
                                required>

                        </div>
                        

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Employee Photo
                        </label>

                        <input
                            type="file"
                            name="photo"
                            class="form-control"
                            accept="image/*">

                    </div>

                    <div class="text-center mt-4">

                        <button
                            type="submit"
                            class="btn btn-success">

                            <i class="bi bi-check-circle-fill"></i>

                            Save Employee

                        </button>

                        <button
                            type="reset"
                            class="btn btn-warning">

                            <i class="bi bi-arrow-clockwise"></i>

                            Reset

                        </button>

                        <a
                            href="/employees"
                            class="btn btn-secondary">

                            <i class="bi bi-x-circle-fill"></i>

                            Cancel

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
